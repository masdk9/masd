<style>
body { padding-bottom: 0 !important; }
.fhb-inner { background: linear-gradient(135deg,rgba(74,144,226,.3),rgba(74,144,226,.15),rgba(11,18,32,.95)); border: 1px solid rgba(255,255,255,.1); border-radius: 20px; padding: 18px 16px 14px; }
.fhb-title  { font-size: 1.05rem; font-weight: 900; line-height: 1.35; color: #fff; margin-bottom: 6px; text-shadow: 0 2px 8px rgba(0,0,0,.5); }
.fhb-notice { font-size: 11px; color: rgba(220,210,255,.6); line-height: 1.6; margin-bottom: 12px; }
.fhb-chip   { font-size: 10px; font-weight: 700; padding: 4px 10px; border-radius: 9px; display: inline-flex; align-items: center; gap: 4px; }
.chip-o { background: rgba(74,144,226,.12); border: 1px solid rgba(74,144,226,.25); color: var(--blue2); }
.chip-g { background: rgba(91,168,90,.12);  border: 1px solid rgba(91,168,90,.25);  color: var(--green); }
.chip-c { background: rgba(74,144,226,.1);  border: 1px solid rgba(74,144,226,.2);  color: var(--blue2); }
.vac-table { width: 100%; border-collapse: collapse; }
.vac-table th { font-size: 9px; font-weight: 800; color: var(--blue2); padding: 6px 8px; text-align: left; border-bottom: 1px solid rgba(74,144,226,.2); letter-spacing: .8px; text-transform: uppercase; }
.vac-table td { padding: 7px 8px; font-size: 11px; font-weight: 600; color: rgba(255,255,255,.8); border-bottom: 1px solid rgba(255,255,255,.04); }
.vac-table td:last-child { font-weight: 800; color: var(--blue2); text-align: right; }
.vac-table tr:last-child td { border-bottom: none; }
.fee-tbl { width: 100%; border-collapse: collapse; }
.fee-tbl th { font-size: 9px; font-weight: 800; color: var(--blue2); padding: 6px 8px; text-align: left; border-bottom: 1px solid rgba(74,144,226,.2); letter-spacing: .8px; text-transform: uppercase; }
.fee-tbl td { padding: 7px 8px; font-size: 11px; color: rgba(255,255,255,.75); border-bottom: 1px solid rgba(255,255,255,.04); }
.fee-tbl td:last-child { font-weight: 700; color: rgba(255,255,255,.85); }
.fee-tbl tr:last-child td { border-bottom: none; }
.td-tba  { background: rgba(74,144,226,.12); border: 1px solid rgba(74,144,226,.3); color: var(--blue2); }
.tg-tba  { background: rgba(74,144,226,.12); color: var(--blue2); }
.tg-up   { background: rgba(74,144,226,.1); color: var(--blue2); }
.td-up   { background: rgba(74,144,226,.15); border: 1px solid rgba(74,144,226,.3); color: var(--blue2); }
.cmt-section { padding: 0 13px; margin-bottom: 20px; }
.cmt-head    { font-size: 11px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: var(--blue2); display: flex; align-items: center; gap: 6px; margin-bottom: 14px; padding: 14px 0 0; border-top: 1px solid rgba(255,255,255,.07); }
.cmt-item    { display: flex; gap: 9px; margin-bottom: 14px; }
.cmt-av      { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 16px; background: var(--card); border: 1px solid rgba(255,255,255,.1); }
.cmt-bd      { flex: 1; }
.cmt-nm      { font-size: 11px; font-weight: 800; color: var(--blue2); }
.cmt-tx      { font-size: 12px; color: rgba(255,255,255,.85); line-height: 1.45; margin-top: 2px; }
.cmt-meta    { display: flex; align-items: center; gap: 10px; margin-top: 4px; }
.cmt-time    { font-size: 10px; color: rgba(255,255,255,.28); }
.cmt-lb      { font-size: 10px; font-weight: 700; background: none; border: none; cursor: pointer; font-family: 'Poppins',sans-serif; color: rgba(255,255,255,.28); padding: 0; transition: color .2s; }
.cmt-lb:hover { color: var(--blue2); }
.replies     { margin-top: 8px; padding-left: 12px; border-left: 2px solid rgba(255,255,255,.06); display: flex; flex-direction: column; gap: 10px; }
.rep-item    { display: flex; gap: 8px; }
.rep-av      { width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; background: var(--card); }
.rep-nm      { font-size: 10px; font-weight: 800; color: var(--blue2); }
.rep-tx      { font-size: 11px; color: rgba(255,255,255,.8); margin-top: 1px; line-height: 1.4; }
.rep-mt      { font-size: 9px; color: rgba(255,255,255,.25); margin-top: 3px; }
.rep-input-row { display: flex; gap: 7px; align-items: center; margin-top: 8px; padding-left: 12px; }
.rep-input-row input { flex: 1; background: rgba(255,255,255,.05); border: 1px solid rgba(74,144,226,.2); border-radius: 12px; padding: 7px 11px; color: #fff; font-family: 'Poppins',sans-serif; font-size: 11px; outline: none; }
.rep-send    { width: 28px; height: 28px; border-radius: 8px; border: none; background: linear-gradient(135deg,var(--blue2),var(--blue2)); color: #fff; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.cmt-input   { display: flex; gap: 8px; align-items: center; background: rgba(255,255,255,.05); border: 1px solid rgba(74,144,226,.22); border-radius: 16px; padding: 9px 12px; margin-top: 4px; }
.my-av       { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; background: var(--card); }
.cmt-input input { flex: 1; background: transparent; border: none; outline: none; color: #fff; font-family: 'Poppins',sans-serif; font-size: 12px; }
.cmt-input input::placeholder { color: rgba(255,255,255,.25); }
.cmt-send    { width: 28px; height: 28px; border-radius: 9px; border: none; background: linear-gradient(135deg,var(--blue2),var(--blue2)); color: #fff; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.skel { background: linear-gradient(90deg,rgba(255,255,255,.05) 25%,rgba(255,255,255,.1) 50%,rgba(255,255,255,.05) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
.not-found { text-align: center; padding: 60px 20px; }
.not-found .nf-icon { font-size: 3rem; margin-bottom: 16px; }
.not-found h2 { font-size: 1.1rem; font-weight: 800; color: var(--blue2); margin-bottom: 8px; }
.not-found p  { font-size: 12px; color: rgba(255,255,255,.45); margin-bottom: 20px; }
</style>
</head>
<body>

<header class="app-header" style="display:grid;grid-template-columns:40px 1fr 40px;align-items:center">
    <div class="hdr-btn" onclick="history.back()"><i class="bi bi-arrow-left"></i></div>
    <div class="brand" style="text-align:center">DigiNotes<span class="brand-dot">.net</span></div>
    <div class="hdr-btn" id="shareBtn" onclick="doShare()" style="justify-self:end"><i class="bi bi-share-fill"></i></div>
</header>

<div class="ad-slot adsense-slot" style="padding:8px 14px 0"><!-- $adsense --></div>

<div id="postRoot">
    <div style="padding:12px 13px">
        <div style="background:var(--card);border-radius:20px;padding:18px 16px">
            <div class="skel" style="width:120px;height:16px;border-radius:8px;margin-bottom:10px"></div>
            <div class="skel" style="width:95%;height:22px;border-radius:6px;margin-bottom:6px"></div>
            <div class="skel" style="width:80%;height:22px;border-radius:6px;margin-bottom:12px"></div>
            <div class="skel" style="width:100%;height:60px;border-radius:8px"></div>
        </div>
    </div>
    <div style="padding:0 13px">
        <div class="skel" style="height:120px;border-radius:17px;margin-bottom:9px"></div>
        <div class="skel" style="height:200px;border-radius:17px;margin-bottom:9px"></div>
        <div class="skel" style="height:180px;border-radius:17px"></div>
    </div>
</div>

<div class="toast-msg" id="toast"></div>

<script type="module">
import {
    fetchPostBySlug, incrementView,
    isPostLiked, toggleLike,
    fetchComments, addComment, addReply,
    formatNum, timeAgo, hasPhone, hasUrl
} from 'https://masd.neocities.org/main/firebase-config.js';

const ANIMALS = ['🦆','🦊','🐼','🐯','🦁','🐸','🦉','🐺','🦋','🐬','🦅','🐨','🦝','🐮','🦜'];
const NAMES   = ['Quick Learner','Sharp Mind','Night Owl','Star Student','Silent Reader','Fast Thinker','Deep Reader','Bold Achiever','Bright Spark','Wise Owl'];
function getMe() {
    let d = localStorage.getItem('dn_me');
    if (!d) { d = JSON.stringify({ a: ANIMALS[Math.floor(Math.random()*ANIMALS.length)], n: NAMES[Math.floor(Math.random()*NAMES.length)] }); localStorage.setItem('dn_me',d); }
    return JSON.parse(d);
}
const ME = getMe();

const PIPELINE = [
    { key:'notif_date',        label:'Notification Release',     icon:'📢' },
    { key:'apply_start',       label:'Online Apply Start',       icon:'📝' },
    { key:'apply_end',         label:'Last Date Apply',          icon:'📅' },
    { key:'fee_payment_start', label:'Fee Payment Start',        icon:'💳' },
    { key:'fee_payment_end',   label:'Fee Payment Last Date',    icon:'💳' },
    { key:'correction_start',  label:'Correction Window Start',  icon:'✏️' },
    { key:'correction_end',    label:'Correction Window End',    icon:'✏️' },
    { key:'admit_card',        label:'Admit Card Release',       icon:'🪪' },
    { key:'exam_date',         label:'Exam Date',                icon:'📋' },
    { key:'answer_key',        label:'Answer Key Release',       icon:'🔑' },
    { key:'objection_start',   label:'Objection Window Start',   icon:'⚠️' },
    { key:'objection_end',     label:'Objection Window End',     icon:'⚠️' },
    { key:'result',            label:'Result Declaration',       icon:'🏆' },
    { key:'scrutiny',          label:'Scrutiny / DV',            icon:'📂' },
    { key:'medical',           label:'Medical Examination',      icon:'🏥' },
    { key:'merit_list',        label:'Final Merit List',         icon:'📊' },
    { key:'joining',           label:'Joining / Posting',        icon:'🎯' },
];

function parseDate(str) {
    if (!str) return null;
    const d = new Date(str);
    if (!isNaN(d)) return d;
    const months = {january:0,february:1,march:2,april:3,may:4,june:5,july:6,august:7,september:8,october:9,november:10,december:11};
    const m = str.toLowerCase().match(/(\d{1,2})\s+([a-z]+)\s+(\d{4})/);
    if (m && months[m[2]] !== undefined) return new Date(parseInt(m[3]), months[m[2]], parseInt(m[1]));
    return null;
}

function computeStages(post) {
    const dates = post.dates || {};
    const today = new Date(); today.setHours(0,0,0,0);
    return PIPELINE.map(s => {
        const val = dates[s.key];
        if (!val || val.trim() === '') return null;
        if (/^tba$/i.test(val.trim())) return { ...s, status:'tba', display:'TBA' };
        if (val.includes('~')) return { ...s, status:'upcoming', display: val };
        const parsed = parseDate(val);
        if (parsed) {
            if (parsed < today) return { ...s, status:'done', display: val };
            if (parsed.getTime() === today.getTime()) return { ...s, status:'active', display: val };
            return { ...s, status:'upcoming', display: val };
        }
        return { ...s, status:'done', display: val };
    }).filter(Boolean);
}

const slug = new URLSearchParams(location.search).get('id');
if (!slug) { showNotFound('Post ID missing'); } else { loadPost(slug); }

async function loadPost(slug) {
    const post = await fetchPostBySlug(slug);
    if (!post) { showNotFound('Post nahi mili'); return; }
    document.title = `${post.title} — DigiNotes.net`;
    document.querySelector('meta[name="description"]').content = post.desc || post.short_notice || '';
    document.querySelector('meta[property="og:title"]').content = post.title;
    document.querySelector('link[rel="canonical"]').href = location.href;
    incrementView(slug);
    document.getElementById('postRoot').innerHTML = buildPage(post);
    loadComments(slug);
    if (location.hash === '#comments') {
        setTimeout(() => document.getElementById('comments-anchor')?.scrollIntoView({ behavior:'smooth' }), 500);
    }
    window.doShare = () => {
        if (navigator.share) { navigator.share({ title: post.title, url: location.href }); }
        else { navigator.clipboard.writeText(location.href); toast('🔗 Link copied!'); }
    };
}

function buildPage(post) {
    const stages = computeStages(post);
    return `
    <div style="margin:12px 13px 0">
        <div class="fhb-inner">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:6px;margin-bottom:10px">
                <span style="font-size:9px;font-weight:800;color:rgba(255,255,255,.45);letter-spacing:1.2px;text-transform:uppercase">${post.org || ''}</span>
                <span style="font-size:9px;font-weight:700;color:rgba(74,144,226,.7);background:rgba(74,144,226,.08);border:1px solid rgba(74,144,226,.2);padding:3px 9px;border-radius:8px">Advt: ${post.advt_no || 'N/A'}</span>
            </div>
            <div class="fhb-title">${post.title}</div>
            <p class="fhb-notice">${post.short_notice || post.desc || ''}</p>
            <div style="display:flex;flex-wrap:wrap;gap:6px">
                <span class="fhb-chip chip-o"><i class="bi bi-calendar3"></i> ${post.pub_date || '—'}</span>
                ${post.seats?.total ? `<span class="fhb-chip chip-g"><i class="bi bi-people-fill"></i> ${post.seats.total.toLocaleString('en-IN')} Posts</span>` : ''}
                <span class="fhb-chip chip-c"><i class="bi bi-mortarboard-fill"></i> ${post.ql || '—'}</span>
            </div>
        </div>
    </div>
    <div class="fp-cw">
    <div class="ad-slot adsense-slot" style="margin-bottom:9px"><!-- $adsense --></div>
    ${buildVacancy(post)}
    ${buildEligibility(post)}
    ${buildAge(post)}
    ${buildTimeline(stages)}
    ${buildFee(post)}
    ${buildLinks(post)}
    <div class="ad-slot adsense-slot" style="margin-bottom:9px"><!-- $adsense --></div>
    </div>`;
}

function buildVacancy(post) {
    const seats = post.seats;
    if (!seats?.total) return '';
    let h = `<div class="sb sb-o">
    <div class="sbt" style="color:var(--blue2)"><i class="bi bi-person-lines-fill"></i> Vacancy Details</div>
    <div style="text-align:center;background:linear-gradient(135deg,rgba(74,144,226,.15),rgba(74,144,226,.1));border:1px solid rgba(74,144,226,.25);border-radius:14px;padding:14px;margin-bottom:11px">
        <div style="font-size:2rem;font-weight:900;color:var(--blue2)">${seats.total.toLocaleString('en-IN')}</div>
        <div style="font-size:10px;font-weight:700;color:rgba(255,255,255,.45);margin-top:2px">Total Vacancies</div>
    </div>`;
    if (post.postwise_text) {
        const rows = post.postwise_text.split('\n').filter(Boolean).map(l => {
            const p = l.split(/[|\u2014\u2013-]/).map(x => x.trim()).filter(Boolean);
            return p.length >= 2 ? `<tr><td>${p[0]}</td><td>${p[1]}</td></tr>` : null;
        }).filter(Boolean);
        if (rows.length) h += `<div style="font-size:9px;font-weight:800;color:rgba(255,255,255,.35);letter-spacing:1px;text-transform:uppercase;margin-bottom:7px">📋 Post-wise Vacancy</div>
        <div style="overflow-x:auto"><table class="vac-table"><thead><tr><th>Post Name</th><th>Seats</th></tr></thead><tbody>${rows.join('')}</tbody></table></div>`;
    }
    h += `<div style="font-size:11px;color:rgba(74,144,226,.7);background:rgba(74,144,226,.05);border:1px solid rgba(74,144,226,.15);border-radius:10px;padding:9px 12px;margin-top:10px">ℹ️ Category-wise reservation ke liye official notification dekhein.</div>`;
    return h + '</div>';
}

function buildEligibility(post) {
    if (!post.qualification_text) return '';
    const lines = post.qualification_text.split('\n').filter(Boolean);
    return `<div class="sb sb-c">
    <div class="sbt" style="color:var(--blue2)"><i class="bi bi-patch-check-fill"></i> Eligibility Criteria</div>
    <div style="background:rgba(74,144,226,.06);border:1px solid rgba(74,144,226,.15);border-radius:12px;padding:10px 12px">
        <div style="font-size:9px;font-weight:800;color:var(--blue2);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">📚 Qualification</div>
        ${lines.map(l=>`<div style="display:flex;gap:7px;margin-bottom:5px;font-size:12px;font-weight:600;color:rgba(255,255,255,.85);line-height:1.5"><span style="color:var(--blue2);flex-shrink:0">▸</span><span>${l}</span></div>`).join('')}
    </div></div>`;
}

function buildAge(post) {
    if (!post.age_text) return '';
    const lines = post.age_text.split('\n').filter(Boolean);
    return `<div class="sb sb-y">
    <div class="sbt" style="color:var(--blue2)"><i class="bi bi-person-badge-fill"></i> Age Limit</div>
    <div style="background:rgba(74,144,226,.06);border:1px solid rgba(74,144,226,.15);border-radius:12px;padding:10px 12px">
        ${lines.map(l=>`<div style="display:flex;gap:7px;margin-bottom:5px;font-size:12px;font-weight:600;color:rgba(255,255,255,.85);line-height:1.5"><span style="color:var(--blue2);flex-shrink:0">▸</span><span>${l}</span></div>`).join('')}
    </div></div>`;
}

function buildTimeline(stages) {
    if (!stages.length) return '';
    const meta = {
        done:     {dotCls:'td-done', dotTxt:'✓', tagCls:'tg-done', tagTxt:'Completed'},
        active:   {dotCls:'td-now',  dotTxt:'●', tagCls:'tg-now',  tagTxt:'🔴 Active'},
        upcoming: {dotCls:'td-up',   dotTxt:'◷', tagCls:'tg-up',   tagTxt:'Upcoming'},
        tba:      {dotCls:'td-tba',  dotTxt:'?', tagCls:'tg-tba',  tagTxt:'📌 TBA'},
    };
    return `<div class="sb sb-y">
    <div class="sbt" style="color:var(--blue2)"><i class="bi bi-clock-history"></i> All Important Dates</div>
    <div class="tl">
    ${stages.map(s => {
        const m = meta[s.status];
        return `<div class="tlr">
            <div class="tld ${m.dotCls}">${m.dotTxt}</div>
            <div class="tl-info">
                <div class="tl-name"><span>${s.icon} ${s.label}</span><span class="tl-tag ${m.tagCls}">${m.tagTxt}</span></div>
                <div class="tl-date" style="${s.status==='tba'?'color:rgba(74,144,226,.6)':''}">
                    ${s.status==='tba' ? '📌 TBA' : s.display||'—'}
                </div>
            </div>
        </div>`;
    }).join('')}
    </div></div>`;
}

function buildFee(post) {
    const feeText = post.fee_text;
    const methods = post.fees?.methods || [];
    if (!feeText && !methods.length) return '';
    let rows = [];
    if (feeText) {
        rows = feeText.split('\n').filter(Boolean).map(l => {
            const p = l.split(/[|\u2014\u2013]/).map(x => x.trim()).filter(Boolean);
            return p.length >= 2 ? { cat: p[0], amt: p[1] } : null;
        }).filter(Boolean);
    }
    return `<div class="sb sb-p">
    <div class="sbt" style="color:var(--blue2)"><i class="bi bi-cash-coin"></i> Application Fee</div>
    ${rows.length ? `<div style="overflow-x:auto"><table class="fee-tbl">
        <thead><tr><th>Category</th><th>Fee</th></tr></thead>
        <tbody>${rows.map(r=>`<tr><td>${r.cat}</td><td>${r.amt}</td></tr>`).join('')}</tbody>
    </table></div>` : ''}
    ${methods.length ? `<div style="font-size:9px;font-weight:800;color:rgba(255,255,255,.35);letter-spacing:1px;text-transform:uppercase;margin:10px 0 6px">💳 Payment Methods</div>
    <div style="display:flex;flex-wrap:wrap;gap:5px">${methods.map(m=>`<span style="font-size:9px;font-weight:700;padding:4px 10px;border-radius:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.6)">${m}</span>`).join('')}</div>` : ''}
    </div>`;
}

function buildLinks(post) {
    const links = post.links;
    if (!links) return '';
    const valid = (v) => v && v.trim() !== '' && !/^tba$/i.test(v.trim());
    const all = [];
    if (valid(links.official_site))    all.push({icon:'🌐', name:'Official Website',      sub:'Official Portal',  url:links.official_site,   color:'rgba(255,255,255,.5)'});
    if (valid(links.apply))            all.push({icon:'📝', name:'Apply Online',          sub:'Apply Now',        url:links.apply,           color:'var(--green)'});
    if (valid(links.notification))     all.push({icon:'📄', name:'Official Notification', sub:'Full PDF',         url:links.notification,    color:'var(--blue2)'});
    if (valid(links.revised_vacancy))  all.push({icon:'📊', name:'Revised Vacancy',       sub:'Updated Notice',   url:links.revised_vacancy, color:'var(--blue2)'});
    if (valid(links.admit_card))       all.push({icon:'🪪', name:'Admit Card',            sub:'Download',         url:links.admit_card,      color:'var(--blue2)'});
    if (valid(links.answer_key))       all.push({icon:'🔑', name:'Answer Key PDF',        sub:'Provisional',      url:links.answer_key,      color:'var(--blue2)'});
    if (valid(links.objection))        all.push({icon:'⚠️', name:'Objection Portal',      sub:'Submit Objection', url:links.objection,       color:'var(--blue2)'});
    if (valid(links.result))           all.push({icon:'🏆', name:'Result Download',       sub:'Declared',         url:links.result,          color:'var(--green)'});
    if (valid(links.merit_list))       all.push({icon:'📊', name:'Final Merit List',      sub:'PDF',              url:links.merit_list,      color:'var(--blue2)'});
    if (!all.length) return '';
    return `<div class="sb sb-l">
    <div class="sbt" style="color:var(--green)"><i class="bi bi-link-45deg"></i> Important Links</div>
    ${all.map(l=>`<div class="dl-row" onclick="window.open('${l.url}','_blank')">
        <div class="dl-left">
            <div class="dl-icon" style="background:rgba(255,255,255,.06)">${l.icon}</div>
            <div><div class="dl-name">${l.name}</div><div class="dl-sub">${l.sub}</div></div>
        </div>
        <i class="bi bi-box-arrow-up-right" style="color:${l.color}"></i>
    </div>`).join('')}
    </div>`;
}

async function loadComments(slug) {
    const section = document.getElementById('cmt-section');
    if (!section) return;
    const comments = await fetchComments(slug);
    const cmtList = document.getElementById('cmt-list');
    if (!cmtList) return;
    if (!comments.length) { cmtList.innerHTML = `<div style="text-align:center;padding:20px;font-size:12px;color:rgba(255,255,255,.3)">Pehla comment karo! 💬</div>`; return; }
    cmtList.innerHTML = comments.map(c => `
    <div class="cmt-item">
        <div class="cmt-av">${c.animal || '🦆'}</div>
        <div class="cmt-bd">
            <div class="cmt-nm">${c.name || 'Anonymous'}</div>
            <div class="cmt-tx">${c.text}</div>
            <div class="cmt-meta">
                <span class="cmt-time">${timeAgo(c.created_at)}</span>
                <button class="cmt-lb" onclick="likeCmt(this)">❤️ ${c.likes||0}</button>
                <button class="cmt-lb" onclick="toggleReply('${c.id}')">↩️ Reply</button>
            </div>
            ${(c.replies||[]).length ? `<div class="replies">${c.replies.map(r=>`<div class="rep-item"><div class="rep-av">${r.animal||'🦆'}</div><div><div class="rep-nm">${r.name||'Anonymous'}</div><div class="rep-tx">${r.text}</div><div class="rep-mt">${r.time||''}</div></div></div>`).join('')}</div>` : ''}
            <div class="rep-input-row" id="ri-${c.id}" style="display:none">
                <input type="text" placeholder="Reply likhein..." id="rtx-${c.id}">
                <button class="rep-send" onclick="postReply('${slug}','${c.id}')"><i class="bi bi-send-fill"></i></button>
            </div>
        </div>
    </div>`).join('');
}

window.toggleReply = (cid) => {
    const ri = document.getElementById('ri-'+cid);
    ri.style.display = ri.style.display === 'none' ? 'flex' : 'none';
    if (ri.style.display === 'flex') document.getElementById('rtx-'+cid)?.focus();
};
window.postReply = async (postSlug, commentId) => {
    const inp = document.getElementById('rtx-'+commentId);
    const txt = inp?.value?.trim();
    if (!txt) return;
    const result = await addReply(postSlug, commentId, txt, ME.a, ME.n);
    if (result.error) { toast('⚠️ '+result.error); return; }
    inp.value = '';
    document.getElementById('ri-'+commentId).style.display = 'none';
    toast('✅ Reply post ho gayi!');
    loadComments(postSlug);
};
window.postCmt = async (postSlug) => {
    const inp = document.getElementById('mainCmtIn');
    const txt = inp?.value?.trim();
    if (!txt) return;
    const result = await addComment(postSlug, txt, ME.a, ME.n);
    if (result.error) { toast('⚠️ '+result.error); return; }
    inp.value = '';
    toast('✅ Comment post ho gaya!');
    loadComments(postSlug);
};
window.likeCmt = (btn) => {
    const n = parseInt(btn.textContent.replace(/[^0-9]/g,''))+1;
    btn.textContent = `❤️ ${n}`;
    btn.style.color = 'var(--blue2)';
};
function showNotFound(msg) {
    document.getElementById('postRoot').innerHTML = `<div class="not-found"><div class="nf-icon">😕</div><h2>Post Nahi Mili</h2><p>${msg}</p><a href="index.html" class="btn-m ba" style="display:inline-flex;text-decoration:none;padding:12px 24px;border-radius:15px">🏠 Home Par Jaao</a></div>`;
}
function toast(msg) {
    const t = document.getElementById('toast');
    if (!t) return;
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
}
</script>

<div id="cmt-section" style="display:none">
    <div class="cmt-section" id="comments-anchor">
        <div class="cmt-head"><i class="bi bi-chat-dots-fill"></i> Discussion</div>
        <div id="cmt-list"></div>
        <div class="cmt-input">
            <div class="my-av" id="myAv">🦆</div>
            <input type="text" placeholder="Comment likhein..." id="mainCmtIn" onkeyup="if(event.key==='Enter')postCmt(new URLSearchParams(location.search).get('id'))">
            <button class="cmt-send" onclick="postCmt(new URLSearchParams(location.search).get('id'))"><i class="bi bi-send-fill"></i></button>
        </div>
    </div>
</div>

<script>
const observer = new MutationObserver(() => {
    if (document.querySelector('.fp-cw')) {
        document.getElementById('cmt-section').style.display = 'block';
        observer.disconnect();
    }
});
observer.observe(document.getElementById('postRoot'), { childList: true, subtree: true });
</script>
</body>
</html>
